name: Android Release Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Locate project dir (where gradlew is)
        id: locate
        shell: bash
        run: |
          set -e
          dir="$(find . -maxdepth 4 -name gradlew -type f -print -quit | xargs -r dirname)"
          if [ -z "$dir" ]; then
            echo "gradlew not found"
            exit 1
          fi
          echo "Found gradlew in: $dir"
          echo "project_dir=$dir" >> "$GITHUB_OUTPUT"

      - name: Build Release APK
        shell: bash
        run: |
          set -e
          cd "${{ steps.locate.outputs.project_dir }}"
          chmod +x ./gradlew
          ./gradlew --no-daemon clean :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: |
            **/app/build/outputs/apk/release/*release*.apk
          if-no-files-found: error
