name: Android Release Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        # 你的 README 说明项目在 ProjectionBypassModule 目录下构建
        working-directory: ProjectionBypassModule

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 可选：打印版本信息，方便排查
      - name: Gradle/AGP info
        run: ./gradlew -v

      - name: Build Release APK (unsigned)
        run: ./gradlew --no-daemon clean :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: ProjectionBypassModule/app/build/outputs/apk/release/*release*.apk
          if-no-files-found: error
