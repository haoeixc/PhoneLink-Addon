name: Build APK (generate wrapper in CI)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.2"

      # 生成 wrapper（只在 CI 工作区，不会提交回仓库）
      - name: Generate Gradle Wrapper (local only)
        run: gradle wrapper --gradle-version 8.2 --distribution-type all

      - name: Build Release
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/*release*.apk
          if-no-files-found: error
